# nginx server block for the Inspira SPA.
#
# Serves the Vite build output from /usr/share/nginx/html and falls back to
# /index.html for unknown paths so client-side routing works. Static asset
# filenames are content-hashed by Vite, so we can cache them hard.
#
# Security-header rationale lives in docs/ops/security-headers.md — update
# that file in lockstep when touching anything in this block.

# Hide "Server: nginx/x.y.z" banner — version disclosure is reconnaissance.
server_tokens off;

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # --------------------------------------------------------------------
    # Compression
    # --------------------------------------------------------------------
    # Gzip text assets. Vite already emits small JS, but gzip still wins on
    # larger vendor chunks. ``gzip_vary on`` makes caches key on
    # Accept-Encoding so uncompressed clients get the uncompressed copy.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    # --------------------------------------------------------------------
    # Security headers (applied to every response via ``always``)
    # --------------------------------------------------------------------
    # CSP — the shape of this directive is intentional. Notes:
    #   - script-src has NO 'unsafe-inline' / 'unsafe-eval': Vite emits
    #     hashed bundle files under /assets, never inline <script>.
    #   - style-src allows 'unsafe-inline' because Vite inlines a small
    #     amount of critical CSS into the HTML shell. Trade-off documented
    #     in docs/ops/security-headers.md — tighten later via hashes/nonce
    #     if the team decides the risk is worth the build complexity.
    #   - connect-src enumerates prod + dev API origins. Add new ones here
    #     when extra services land (Sentry's browser SDK, etc).
    #   - frame-ancestors 'none' blocks clickjacking; X-Frame-Options DENY
    #     below repeats this for legacy browsers.
    #   - upgrade-insecure-requests is emitted in the header so any mixed
    #     HTTP subresource load auto-upgrades to HTTPS. This prod config
    #     assumes the edge is always HTTPS (Fly/Railway terminate TLS).
    # connect-src kept tight for prod: only self-origin + the api domain.
    # Local dev uses `vite dev` (not nginx) so the `http://localhost:4174` /
    # `http://127.0.0.1:4174` origins the header used to carry never applied
    # to dev anyway — leaving them in the prod header was a free attack
    # surface. Removed (2026-04-24 hygiene sweep).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://api.tryinspira.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # HSTS — only emit over HTTPS so plain-HTTP local/staging testing
    # doesn't get the browser to pin HTTPS for a year. Preload list entry
    # is intentional (see docs/ops/security-headers.md for the commitment).
    if ($scheme = https) {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Block MIME-type sniffing — browsers must respect our Content-Type.
    add_header X-Content-Type-Options "nosniff" always;

    # Leak only the origin on cross-origin requests; full URL on same-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny features we don't use. Loosen individual entries (microphone=self,
    # etc.) if/when product enables voice input, camera, geolocation, etc.
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

    # Redundant with CSP frame-ancestors but keeps legacy IE/older Safari safe.
    add_header X-Frame-Options "DENY" always;

    # --------------------------------------------------------------------
    # Caching — hashed bundles vs the HTML shell
    # --------------------------------------------------------------------
    # Hashed JS/CSS assets — cache forever; filename change busts the cache.
    # ``immutable`` tells browsers not to even revalidate during the window.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html must be re-fetched every navigation so users pick up new
    # bundle hashes as soon as a deploy lands. ``no-cache`` forces a
    # conditional revalidation, not a stale serve.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Everything else: try the file, then a directory index, then fall back
    # to index.html so the SPA handles the route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
