<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    Inspira favicon. Small square that pairs a lowercase italic "i"
    against cream paper with the signature sage tittle dot. Kept as a
    single self-contained SVG so <link rel="icon" sizes="…"> can reuse
    it at every rel size — modern browsers rasterise SVG favicons fine
    and the palette stays consistent across every render target.
  -->
  <rect width="32" height="32" rx="6" fill="#F5F0E6"/>
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#2B2520" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="20" cy="9" r="2.4" fill="#568868"/>
  <text x="16" y="24" text-anchor="middle" font-family="'Source Serif 4', Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#2B2520">i</text>
</svg>
