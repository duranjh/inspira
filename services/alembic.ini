# Alembic configuration for planning-studio-service.
#
# script_location is relative to this file, so `alembic -c services/alembic.ini`
# from the repo root and a plain `alembic` call from services/ both find the
# migrations directory at services/alembic.
#
# sqlalchemy.url is intentionally blank. env.py populates it at runtime from
# planning_studio_service.config.load_config().database_url, which already
# respects the DATABASE_URL environment variable for Postgres deployments and
# falls back to the local SQLite file otherwise.

[alembic]
# %(here)s resolves to the directory containing this ini file, so the same
# script_location works whether alembic is invoked from services/ directly
# or from the repo root via `-c services/alembic.ini`.
script_location = %(here)s/alembic
sqlalchemy.url =
prepend_sys_path = %(here)s
path_separator = os
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
